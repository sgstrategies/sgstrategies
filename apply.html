<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply Now — SG Strategies</title>
  <meta name="description" content="Apply to work with SG Strategies — SMS Marketing &amp; Paid Ads specialists." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #D01F1F;
      --red-bright: #FF2525;
      --red-dark:   #8B0000;
      --black:      #0A0A0A;
      --black-mid:  #111111;
      --black-soft: #1A1A1A;
      --grey-dark:  #222222;
      --grey-mid:   #444444;
      --grey-light: #888888;
      --white:      #F5F0EB;
      --off-white:  #E8E0D5;
      --font-display: 'Bebas Neue', sans-serif;
      --font-cond:    'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
      cursor: none;
      min-height: 100vh;
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--red-bright);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: all 0.15s ease;
      opacity: 0.7;
    }
    a, button { cursor: none; }

    /* NOISE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(208,31,31,0.2);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.9rem;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--red-bright); }
    .nav-back {
      font-family: var(--font-cond);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-light);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }

    /* PAGE */
    .apply-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 140px 48px 80px;
    }

    .apply-header {
      text-align: center;
      max-width: 640px;
      margin-bottom: 64px;
    }

    .apply-eyebrow {
      font-family: var(--font-cond);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .apply-eyebrow::before,
    .apply-eyebrow::after {
      content: '';
      display: inline-block;
      width: 32px; height: 1px;
      background: var(--red);
    }

    .apply-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 7vw, 7rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      color: var(--white);
      margin-bottom: 24px;
    }
    .apply-title em {
      font-style: normal;
      color: var(--red-bright);
    }

    .apply-sub {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--grey-light);
      line-height: 1.85;
    }

    /* FORM WRAPPER */
    .apply-form-wrap {
      width: 100%;
      max-width: 760px;
      background: var(--black-mid);
      border: 1px solid rgba(208,31,31,0.2);
      padding: 8px;
      min-height: 520px;
    }

    /* FOOTER */
    .apply-footer {
      text-align: center;
      margin-top: 64px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.05);
      width: 100%;
      max-width: 760px;
    }
    .apply-footer-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--grey-mid);
      margin-bottom: 8px;
    }
    .apply-footer-logo span { color: var(--red); }
    .apply-footer p {
      font-size: 0.78rem;
      color: var(--grey-mid);
    }
    .apply-footer a {
      color: var(--grey-light);
      text-decoration: none;
      transition: color 0.2s;
    }
    .apply-footer a:hover { color: var(--red-bright); }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .apply-page { padding: 120px 24px 60px; }
      .apply-form-wrap { padding: 4px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="index.html" class="nav-logo">SG<span>.</span>Strategies</a>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </nav>

  <div class="apply-page">

    <div class="apply-header">
      <p class="apply-eyebrow">Let's Work Together</p>
      <h1 class="apply-title">Apply<br><em>Now.</em></h1>
      <p class="apply-sub">Tell us about your brand and goals. We review every application and get back to you within 24 hours.</p>
    </div>

    <div class="apply-form-wrap">
      <div data-tf-live="01KTCMVCC23VV48VH67N7MPGKN"></div>
      <script src="//embed.typeform.com/next/embed.js"></script>
    </div>

    <div class="apply-footer">
      <div class="apply-footer-logo">SG<span>.</span>Strategies</div>
      <p>&copy; 2026 SG Strategies. Questions? <a href="mailto:samarthgujanatti11@gmail.com">samarthgujanatti11@gmail.com</a></p>
    </div>

  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });
    function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();
  </script>
</body>
</html>
